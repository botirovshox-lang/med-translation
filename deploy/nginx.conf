# nginx config for Medical CAT Translator
# Placed at /etc/nginx/sites-available/medcat
# certbot --nginx will add SSL block automatically

server {
    listen 80;
    listen [::]:80;
    server_name {{DOMAIN}};

    # Allow large DOCX uploads (up to 50 MB)
    client_max_body_size 50M;

    # Long timeouts for batch translation (up to 30 min)
    proxy_read_timeout    1800s;
    proxy_connect_timeout 60s;
    proxy_send_timeout    1800s;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Gzip for static assets
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
